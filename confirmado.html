<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conta confirmada — NastaDesk</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230B6E4F'/><text y='24' x='5' font-size='22' font-family='serif' fill='white'>N</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root{ --verde:#0B6E4F; --verde-escuro:#07523A; --verde-claro:#D6F2E6; --creme:#F8F7F3; --tinta:#1B221E; --cinza:#5E6B64; --amarelo:#E8A820; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;color:var(--tinta);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 90% at 100% 0%, #0e7d5a 0%, transparent 55%), linear-gradient(165deg, var(--verde) 0%, var(--verde-escuro) 100%);}
  .card{background:#fff;border-radius:24px;max-width:440px;width:100%;padding:42px 34px 34px;text-align:center;box-shadow:0 30px 70px -22px rgba(7,40,28,.55)}
  .logo{font-family:'DM Serif Display',serif;font-size:24px;color:var(--verde);margin-bottom:26px}
  .logo span{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--cinza);display:block;margin-top:2px}
  .icon{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;background:var(--verde-claro)}
  .icon svg{width:42px;height:42px;color:var(--verde)}
  .icon.warn{background:#fbeecb}
  .icon.warn svg{color:var(--amarelo)}
  h1{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.12;margin-bottom:12px;color:var(--tinta)}
  p{font-size:15.5px;color:var(--cinza);line-height:1.55;max-width:34ch;margin:0 auto 28px}
  .btn{display:inline-block;background:var(--verde);color:#fff;text-decoration:none;font-weight:600;font-size:16px;padding:15px 30px;border-radius:14px;transition:background .15s;box-shadow:0 14px 28px -12px rgba(11,110,79,.6)}
  .btn:hover{background:var(--verde-escuro)}
  .foot{margin-top:26px;font-size:12.5px;color:var(--cinza)}
  .foot b{color:var(--verde)}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">NastaDesk <span>by Nastaclin</span></div>
    <div class="icon" id="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1 id="titulo">Conta ativada!</h1>
    <p id="msg">Seu e-mail foi confirmado com sucesso. Sua conta já está ativa — é só entrar e começar a usar o NastaDesk.</p>
    <a class="btn" id="btn" href="/">Entrar no painel</a>
    <div class="foot">NastaDesk · <b>nastadesk.vercel.app</b></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPA_URL = 'https://zrkadblxozddreiwruhv.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpya2FkYmx4b3pkZHJlaXdydWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjA4MjEsImV4cCI6MjA5NjUzNjgyMX0.BQkXr831MlctUk-FhfEYkrgs6Amdpho5yDWcR3BtXok';
  // Cria o cliente para que a sessão presente na URL (após a confirmação) seja
  // detectada e salva — assim, ao clicar em "Entrar no painel", já entra logado.
  try { const { createClient } = supabase; createClient(SUPA_URL, SUPA_KEY); } catch (e) {}

  // Se o link estiver expirado/inválido, o Supabase retorna um erro na URL.
  const params = new URLSearchParams((location.hash || '').replace(/^#/, '') + '&' + (location.search || '').replace(/^\?/, ''));
  if (params.get('error') || params.get('error_code') || params.get('error_description')) {
    document.getElementById('icon').classList.add('warn');
    document.getElementById('icon').innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
    document.getElementById('titulo').textContent = 'Link expirado';
    document.getElementById('msg').textContent = 'Este link de confirmação expirou ou já foi usado. Tente entrar normalmente; se não conseguir, faça login para reenviar a confirmação.';
    document.getElementById('btn').textContent = 'Ir para o login';
  }
</script>
</body>
</html>
