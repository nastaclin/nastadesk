# Servidor Evolution com HTTPS automático (Caddy) — versão de PRODUÇÃO.
# Usa um domínio (definido como DOMINIO no .env) e o Caddy emite o certificado
# SSL sozinho. A porta 8080 NÃO fica exposta — só o Caddy (80/443) acessa.
#
# COMO USAR:
#   1) No .env, defina: DOMINIO, EVOLUTION_API_KEY, DB_PASSWORD
#   2) Aponte o domínio (registro DNS tipo A) para o IP do servidor
#   3) docker compose up -d
#   4) No Supabase, EVOLUTION_API_URL = https://SEU_DOMINIO

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - evolution-api

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    expose:
      - "8080"
    env_file: .env
    environment:
      - SERVER_URL=https://${DOMINIO}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${DB_PASSWORD}@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  evolution_instances:
  postgres_data:
  redis_data:
